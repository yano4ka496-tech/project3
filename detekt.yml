# Конфигурация Detekt
# Используется стандартная конфигурация с дополнительными правилами для Android

autoCorrect: false
baseline: null
buildUponDefaultConfig: true
config:
  # Включаем стандартные правила
  default: true
  
  # Дополнительные правила для Android
  android:
    active: true
    
    # Правила для именования
    naming:
      class: "^[A-Z][a-zA-Z0-9]*$"
      function: "^[a-z][a-zA-Z0-9]*$"
      property: "^[a-z][a-zA-Z0-9]*$"
      variable: "^[a-z][a-zA-Z0-9]*$"
      companionObject: "^[A-Z][a-zA-Z0-9]*$"
      enumEntry: "^[A-Z][A-Z0-9_]*$"
      typeAlias: "^[A-Z][a-zA-Z0-9]*$"
      
    # Правила для кода
    complexity:
      active: true
      maxComplexity: 10
      maxFunctionLength: 40
      maxTopLevelFunctionLength: 40
      maxPropertyLength: 40
      maxSecondaryFunctionLength: 40
      
    # Правила для производительности
    performance:
      active: true
      
    # Правила для корректности
    correction:
      active: true
      
    # Правила для стиля
    style:
      active: true
      
    # Правила для потенциальных багов
