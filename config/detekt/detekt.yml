# Минимальная рабочая конфигурация Detekt
config:
  validation: true
  warningsAsErrors: false
build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1
processors:
  active: true
  exclude:
    - 'FunctionCount'
    - 'PropertyCount'
console-reports:
  active: true
  exclude:
    - 'ProjectStatistics'
    - 'ComplexityReport'
    - 'NotificationReport'
output-reports:
  active: true
  exclude:
    - 'TxtOutputReport'
    - 'XmlOutputReport'
    - 'HtmlOutputReport'

# Пустые секции, чтобы избежать ошибок
performance:
  active: false
empty-blocks:
  active: false
exceptions:
  active: false
comments:
  active: false
naming:
  active: false
complexity:
  active: false
style:
  active: false
potential-bugs:
  active: false
